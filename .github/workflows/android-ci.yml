name: Android CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

# AdMob configuration is sourced from repository secrets. When a secret is
# unset (e.g. on a fork without the user's account), the build falls back to
# Google's public AdMob test IDs via app/build.gradle.kts so the build still
# succeeds without leaking real ad inventory. The env block lives inside each
# job because the `secrets` context is only valid at job/step scope.

jobs:
  test-and-build:
    name: Test + Build APKs
    runs-on: ubuntu-latest
    env:
      ADS_ENABLED: ${{ vars.ADS_ENABLED || 'true' }}
      ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
      ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
      ADMOB_INTERSTITIAL_AD_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
      ADMOB_NATIVE_AD_UNIT_ID: ${{ secrets.ADMOB_NATIVE_AD_UNIT_ID }}
      ADMOB_APP_OPEN_AD_UNIT_ID: ${{ secrets.ADMOB_APP_OPEN_AD_UNIT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Materialize google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "Writing google-services.json from GOOGLE_SERVICES_JSON secret"
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "GOOGLE_SERVICES_JSON secret not set — writing placeholder so the Firebase Gradle plugin can parse the file."
            printf '%s' '{"project_info":{"project_number":"000000000000","project_id":"ollama-android-ci","storage_bucket":"ollama-android-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"com.charles.ollama.client"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyA-placeholder-placeholder-placeholder000"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json
          fi

      - name: Materialize release keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$RELEASE_KEYSTORE" ]; then
            echo "RELEASE_KEYSTORE secret not set — release build will fall back to debug signing."
            exit 0
          fi
          echo "$RELEASE_KEYSTORE" | base64 -d > app/release.keystore
          {
            echo "storeFile=app/release.keystore"
            echo "storePassword=$RELEASE_KEYSTORE_PASSWORD"
            echo "keyAlias=$RELEASE_KEY_ALIAS"
            echo "keyPassword=$RELEASE_KEY_PASSWORD"
          } > keystore.properties

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Run lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Assemble release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Bundle release AAB
        run: ./gradlew :app:bundleRelease --stacktrace

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

  e2e:
    name: E2E launch test (emulator)
    needs: test-and-build
    runs-on: ubuntu-latest
    env:
      ADS_ENABLED: ${{ vars.ADS_ENABLED || 'true' }}
      ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
      ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
      ADMOB_INTERSTITIAL_AD_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
      ADMOB_NATIVE_AD_UNIT_ID: ${{ secrets.ADMOB_NATIVE_AD_UNIT_ID }}
      ADMOB_APP_OPEN_AD_UNIT_ID: ${{ secrets.ADMOB_APP_OPEN_AD_UNIT_ID }}

    # Guards two prior Crashlytics regressions that both surfaced at app open:
    #   * UnsatisfiedLinkError: litertlm_jni from LiteRtChatService.<init>
    #   * IllegalArgumentException "parameter must be a descendant of this view"
    #     from ViewGroup.offsetRectBetweenParentAndChild
    # Also guards the AdMob `${admobAppId}` manifest placeholder substitution —
    # if the env vars don't reach the build, AdMob crashes the process at first
    # ad load, which the placeholder assertion in MainActivityLaunchTest catches.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Materialize google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            printf '%s' '{"project_info":{"project_number":"000000000000","project_id":"ollama-android-ci","storage_bucket":"ollama-android-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"com.charles.ollama.client"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyA-placeholder-placeholder-placeholder000"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json
          fi

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-default-x86_64

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_4
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD snapshot generated"

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_4
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --stacktrace

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTests/connected
          if-no-files-found: ignore

  release:
    name: Publish rolling release
    needs:
      - test-and-build
      - e2e
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: artifacts/apk

      - name: Download release AAB
        uses: actions/download-artifact@v4
        with:
          name: app-release-bundle
          path: artifacts/aab

      - name: Compute release metadata
        id: meta
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          SHORT_SHA="$(git rev-parse --short "$GITHUB_SHA")"
          TAG="ci-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          # Mirror the formula in app/build.gradle.kts: versionCode = 1000 +
          # GITHUB_RUN_NUMBER, versionName = "1.2.<run_number>". Surfaced in
          # the release notes so the Play Console version is obvious from the
          # GitHub Release page without unzipping the APK.
          VERSION_CODE=$((1000 + GITHUB_RUN_NUMBER))
          VERSION_NAME="1.2.${GITHUB_RUN_NUMBER}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=v${VERSION_NAME} (build ${VERSION_CODE})" >> "$GITHUB_OUTPUT"
          if [ -n "$RELEASE_KEYSTORE" ]; then
            SIGNING_NOTE="signed with the release keystore"
          else
            SIGNING_NOTE="signed with the debug key (no RELEASE_KEYSTORE secret configured)"
          fi
          {
            echo "body<<EOF"
            echo "Automated release build from \`${GITHUB_REF_NAME}\` at commit \`${SHORT_SHA}\`."
            echo ""
            echo "## Play Store metadata"
            echo "- versionCode: \`${VERSION_CODE}\`"
            echo "- versionName: \`${VERSION_NAME}\`"
            echo ""
            echo "## What's in this build"
            echo "- Release APK produced by \`:app:assembleRelease\`, ${SIGNING_NOTE}"
            echo "- Release App Bundle (AAB) produced by \`:app:bundleRelease\`, ${SIGNING_NOTE} — upload this to the Play Console"
            echo "- AdMob IDs injected from repository secrets (test IDs in unconfigured forks)"
            echo "- Unit tests, lint, and the on-device launch smoke test passed"
            echo ""
            echo "Install with \`adb install ollama-android-${TAG}.apk\`."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stage release assets
        run: |
          mkdir -p release
          # assembleRelease emits app-release.apk (signed) or app-release-unsigned.apk
          # depending on whether the keystore was provided. Pick whichever exists.
          apk_src=$(ls artifacts/apk/*.apk | head -n1)
          cp "$apk_src" "release/ollama-android-${{ steps.meta.outputs.tag }}.apk"
          aab_src=$(ls artifacts/aab/*.aab | head -n1)
          cp "$aab_src" "release/ollama-android-${{ steps.meta.outputs.tag }}.aab"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: ${{ steps.meta.outputs.body }}
          draft: false
          prerelease: false
          make_latest: "true"
          files: |
            release/*.apk
            release/*.aab
