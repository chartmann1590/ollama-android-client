name: Android CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test-and-build:
    name: Test + Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Materialize google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "Writing google-services.json from GOOGLE_SERVICES_JSON secret"
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "GOOGLE_SERVICES_JSON secret not set — writing placeholder so the Firebase Gradle plugin can parse the file."
            printf '%s' '{"project_info":{"project_number":"000000000000","project_id":"ollama-android-ci","storage_bucket":"ollama-android-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"com.charles.ollama.client"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyA-placeholder-placeholder-placeholder000"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json
          fi

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Run lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release:
    name: Publish rolling release
    needs: test-and-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: artifacts

      - name: Compute release metadata
        id: meta
        run: |
          SHORT_SHA="$(git rev-parse --short "$GITHUB_SHA")"
          TAG="ci-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=CI build ${GITHUB_RUN_NUMBER} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            echo "Automated debug build from \`${GITHUB_REF_NAME}\` at commit \`${SHORT_SHA}\`."
            echo ""
            echo "## What's in this build"
            echo "- Debug APK produced by \`:app:assembleDebug\`"
            echo "- Unit tests (\`:app:testDebugUnitTest\`) and lint (\`:app:lintDebug\`) passed"
            echo ""
            echo "Install with \`adb install app-debug.apk\`. Not signed for Play Store distribution."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Rename APK for release asset
        run: |
          mkdir -p release
          cp artifacts/app-debug.apk "release/ollama-android-${{ steps.meta.outputs.tag }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: ${{ steps.meta.outputs.body }}
          prerelease: true
          files: release/*.apk
